name: Release

permissions: {}

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    name: Release
    uses: grafana/xk6/.github/workflows/extension-release.yml@3573dee6ff2056008d56e24e0f643c183e5c8d61 # v1.4.2
    permissions:
      contents: write
    with:
      go-version: "1.24.x"
      os: '["linux", "windows", "darwin"]'
      arch: '["amd64", "arm64"]'
      k6-version: "v1.3.0"
      xk6-version: "1.2.6"
